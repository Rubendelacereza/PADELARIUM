<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PadelFlow</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>

    <header class="topbar glass">
      <div>
        <p class="eyebrow">Liga móvil de pádel</p>
        <h1>PadelFlow</h1>
      </div>
      <div class="topbar-actions"><button id="themeToggle" class="icon-btn" aria-label="Cambiar tema">◐</button><div id="userBadge" class="user-badge hidden"></div></div>
    </header>

    <main id="app"></main>
  </div>

  <template id="authTemplate">
    <section class="screen active">
      <div class="hero glass floating hero-landing">
        <div>
          <div class="hero-chip">Diseño premium · móvil first</div>
          <h2>Tu app de pádel con salas, parejas, jornadas y clasificación</h2>
          <p>Crea usuarios, entra por código y gestiona una liga rápida de 12 jugadores con emparejamientos automáticos, resultados y estadísticas.</p>
        </div>
        <div class="hero-stats">
          <div class="metric-card glass-lite"><strong>12</strong><span>Jugadores</span></div>
          <div class="metric-card glass-lite"><strong>4</strong><span>Jornadas</span></div>
          <div class="metric-card glass-lite"><strong>3</strong><span>Pistas</span></div>
        </div>
      </div>

      <div class="grid-two">
        <div class="card glass">
          <h3>Iniciar sesión</h3>
          <form id="loginForm" class="stack-md">
            <label>
              <span>Usuario</span>
              <input required name="username" placeholder="Ej. ruben" />
            </label>
            <label>
              <span>Contraseña</span>
              <input required type="password" name="password" placeholder="••••••••" />
            </label>
            <button class="btn btn-primary" type="submit">Entrar</button>
          </form>
        </div>

        <div class="card glass">
          <h3>Crear cuenta</h3>
          <form id="registerForm" class="stack-md">
            <label>
              <span>Usuario</span>
              <input required name="username" minlength="3" placeholder="Mínimo 3 caracteres" />
            </label>
            <label>
              <span>Contraseña</span>
              <input required type="password" name="password" minlength="4" placeholder="Mínimo 4 caracteres" />
            </label>
            <button class="btn btn-secondary" type="submit">Registrarme</button>
          </form>
        </div>
      </div>

      <div class="info-row glass">
        <div>
          <strong>Ahora incluye más cosas</strong>
          <p>Código de invitación, lista de espera, asistencia, panel de admin, historial, estadísticas individuales y podio visual.</p>
        </div>
        <div class="mini-pills">
          <span>Animaciones</span>
          <span>Glassmorphism</span>
          <span>Local demo</span>
        </div>
      </div>
    </section>
  </template>

  <template id="lobbyTemplate">
    <section class="screen active stack-lg">
      <div class="hero glass">
        <div class="hero-row">
          <div>
            <p class="eyebrow">Panel principal</p>
            <h2>Salas disponibles</h2>
            <p>Crea una sala o entra por código. Cada sala admite 12 jugadores y gestiona lista de espera si se llena.</p>
          </div>
          <button id="logoutBtn" class="btn btn-ghost">Salir</button>
        </div>
      </div>

      <div class="grid-two">
        <div class="card glass">
          <h3>Crear sala</h3>
          <form id="createRoomForm" class="stack-md">
            <label>
              <span>Nombre de la sala</span>
              <input required name="roomName" maxlength="30" placeholder="Ej. Padel Sant Joan" />
            </label>
            <button class="btn btn-primary" type="submit">Crear sala</button>
          </form>
        </div>

        <div class="card glass">
          <h3>Entrar por código</h3>
          <form id="joinByCodeForm" class="stack-md">
            <label>
              <span>Código de invitación</span>
              <input required name="roomCode" maxlength="8" placeholder="Ej. PF1234" />
            </label>
            <button class="btn btn-secondary" type="submit">Acceder</button>
          </form>
        </div>
      </div>

      <section>
        <div class="section-title-row">
          <h3>Salas</h3>
          <span class="subtle">Estado local en tiempo real</span>
        </div>
        <div id="roomsList" class="stack-md"></div>
      </section>
    </section>
  </template>

  <template id="roomTemplate">
    <section class="screen active stack-lg">
      <div class="hero glass room-hero">
        <div class="hero-row room-head-wrap">
          <div>
            <p class="eyebrow">Sala de juego</p>
            <h2 id="roomTitle"></h2>
            <p id="roomMeta"></p>
          </div>
          <div class="hero-actions">
            <button id="copyCodeBtn" class="btn btn-ghost">Copiar código</button>
            <button id="backLobbyBtn" class="btn btn-ghost">Volver</button>
          </div>
        </div>
        <div id="roomTopStats" class="top-metrics"></div>
      </div>

      <div class="card glass stack-md">
        <div class="section-title-row">
          <h3>Jugadores</h3>
          <span id="capacityBadge" class="capacity-badge"></span>
        </div>
        <div id="playersGrid" class="players-grid"></div>
      </div>

      <div id="attendanceCard" class="card glass stack-md"></div>
      <div id="waitlistCard" class="card glass stack-md"></div>
      <div id="adminPanel" class="stack-lg"></div>

      <div class="grid-two room-grid-bottom">
        <div class="card glass stack-md">
          <div class="section-title-row">
            <h3>Parejas</h3>
            <span class="subtle">6 parejas</span>
          </div>
          <div id="pairsList" class="stack-sm"></div>
        </div>

        <div class="card glass stack-md">
          <div class="section-title-row">
            <h3>Clasificación</h3>
            <span class="subtle">Todos pueden verla</span>
          </div>
          <div id="standingsPodium"></div>
          <div id="standingsTable"></div>
        </div>
      </div>

      <div class="card glass stack-md">
        <div class="section-title-row">
          <h3>Estadísticas de jugadores</h3>
          <span class="subtle">Perfil, rachas y win rate</span>
        </div>
        <div id="eloBoard" class="stack-sm"></div>
        <div id="playerStatsGrid" class="players-stats-grid"></div>
      </div>

      <div class="card glass stack-md">
        <div class="section-title-row">
          <h3>Jornadas y pistas</h3>
          <span class="subtle">4 jornadas · 3 pistas</span>
        </div>
        <div id="matchesBoard" class="stack-md"></div>
      </div>

      <div class="card glass stack-md">
        <div class="section-title-row">
          <h3>Historial de actividad</h3>
          <span class="subtle">Últimos movimientos</span>
        </div>
        <div id="historyFeed" class="history-feed"></div>
      </div>

      <div class="grid-two room-grid-bottom">
        <div class="card glass stack-md">
          <div class="section-title-row">
            <h3>Chat de sala</h3>
            <span class="subtle">Mensajes en tiempo real local</span>
          </div>
          <div id="chatMessages" class="chat-feed"></div>
          <form id="chatForm" class="chat-form">
            <input name="message" maxlength="180" placeholder="Escribe un mensaje a la sala" />
            <button class="btn btn-primary" type="submit">Enviar</button>
          </form>
        </div>

        <div class="card glass stack-md">
          <div class="section-title-row">
            <h3>Centro de avisos</h3>
            <span class="subtle">Eventos clave de la sala</span>
          </div>
          <div id="notificationsFeed" class="history-feed"></div>
      </div>
    </section>
  </template>

  <div id="toastContainer" class="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
