<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#09121f">
  <title>PadelFlow Admin Mode</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="skip-link" href="#mainContent">Saltar al contenido</a>
  <div class="app-shell">
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <header class="topbar glass" role="banner">
      <div>
        <p class="eyebrow">PadelFlow Admin Mode</p>
        <h1>PadelFlow</h1>
      </div>
      <div class="topbar-actions">
        <button id="themeToggle" class="icon-btn" type="button" aria-label="Cambiar entre modo claro y oscuro">◐</button>
        <button id="motionToggle" class="icon-btn" type="button" aria-label="Activar o desactivar animaciones">◎</button>
        <div id="userBadge" class="user-badge hidden" aria-live="polite"></div>
      </div>
    </header>

    <main id="mainContent"></main>
  </div>

  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <template id="authTemplate">
    <section class="screen stack-lg">
      <section class="hero hero-landing glass">
        <div class="stack-md">
          <span class="hero-chip">Accesible · intuitiva · todo en local</span>
          <h2>La app de pádel móvil para organizar parejas, jornadas y clasificación.</h2>
          <p>Regístrate, crea una sala, añade hasta 12 jugadores, genera 6 parejas, monta 4 jornadas automáticas y lleva todos los resultados desde un único móvil.</p>
          <div class="chip-row">
            <span class="chip">Lista de espera</span>
            <span class="chip">Clasificación por parejas</span>
            <span class="chip">Un solo set libre</span>
            <span class="chip">Accesibilidad</span>
          </div>
        </div>
        <div class="hero-stats" aria-label="Resumen de funcionalidades">
          <div class="metric-card glass-lite"><strong>12</strong><span>Jugadores</span></div>
          <div class="metric-card glass-lite"><strong>6</strong><span>Parejas</span></div>
          <div class="metric-card glass-lite"><strong>4</strong><span>Jornadas</span></div>
          <div class="metric-card glass-lite"><strong>1</strong><span>Set libre</span></div>
        </div>
      </section>

      <div class="grid-two">
        <section class="card glass" aria-labelledby="loginTitle">
          <h3 id="loginTitle">Iniciar sesión</h3>
          <form id="loginForm" class="stack-md" novalidate>
            <label><span>Usuario</span><input name="username" autocomplete="username" required minlength="3" placeholder="Ej. ruben"></label>
            <label><span>Contraseña</span><input name="password" autocomplete="current-password" type="password" required minlength="4" placeholder="••••••••"></label>
            <button class="btn btn-primary" type="submit">Entrar</button>
          </form>
        </section>

        <section class="card glass" aria-labelledby="registerTitle">
          <h3 id="registerTitle">Crear cuenta</h3>
          <form id="registerForm" class="stack-md" novalidate>
            <label><span>Usuario</span><input name="username" autocomplete="username" required minlength="3" maxlength="20" placeholder="Mínimo 3 caracteres"></label>
            <label><span>Contraseña</span><input name="password" autocomplete="new-password" type="password" required minlength="4" maxlength="24" placeholder="Mínimo 4 caracteres"></label>
            <button class="btn btn-secondary" type="submit">Registrarme</button>
          </form>
        </section>
      </div>

      <section class="info-row glass">
        <div>
          <strong>Todo funciona offline y en local</strong>
          <p>Los datos se guardan en este navegador con localStorage. Puedes instalarla como app y exportar o importar el estado cuando quieras.</p>
        </div>
        <div class="mini-pills"><span>Offline</span><span>LocalStorage</span><span>PWA</span></div>
      </section>
    </section>
  </template>

  <template id="lobbyTemplate">
    <section class="screen stack-lg">
      <section class="hero glass">
        <div class="hero-row wrap-mobile">
          <div>
            <p class="eyebrow">Lobby principal</p>
            <h2>Salas, accesos rápidos y herramientas</h2>
            <p>Crea una sala, entra por código y usa las herramientas locales para guardar una copia o cargar una demo.</p>
          </div>
          <div class="hero-actions">
            <button id="seedDemoBtn" class="btn btn-ghost" type="button">Cargar demo</button>
            <button id="logoutBtn" class="btn btn-ghost" type="button">Salir</button>
          </div>
        </div>
      </section>

      <div class="grid-two">
        <section class="card glass">
          <h3>Crear sala</h3>
          <form id="createRoomForm" class="stack-md">
            <label><span>Nombre de la sala</span><input name="roomName" required maxlength="30" placeholder="Ej. Liga Sábado Mañana"></label>
            <button class="btn btn-primary" type="submit">Crear sala</button>
          </form>
        </section>

        <section class="card glass">
          <h3>Entrar por código</h3>
          <form id="joinByCodeForm" class="stack-md">
            <label><span>Código de sala</span><input name="roomCode" required maxlength="8" placeholder="Ej. PF4K9A"></label>
            <button class="btn btn-secondary" type="submit">Acceder</button>
          </form>
        </section>
      </div>

      <section class="card glass stack-md">
        <div class="section-title-row wrap-mobile"><h3>Herramientas locales</h3><span class="subtle">Copia de seguridad y reinicio</span></div>
        <div class="tool-grid-3">
          <button id="exportStateBtn" class="btn btn-ghost" type="button">Exportar datos</button>
          <label class="file-input-btn btn btn-ghost" for="importStateInput">Importar datos</label>
          <input id="importStateInput" class="hidden" type="file" accept="application/json">
          <button id="resetStateBtn" class="btn btn-danger" type="button">Resetear app</button>
        </div>
      </section>

      <section class="stack-md">
        <div class="section-title-row wrap-mobile"><h3>Salas disponibles</h3><span class="subtle">Vista rápida local</span></div>
        <div id="roomsList" class="stack-md"></div>
      </section>
    </section>
  </template>

  <template id="roomTemplate">
    <section class="screen stack-lg">
      <section class="hero glass room-hero">
        <div class="hero-row wrap-mobile">
          <div>
            <p class="eyebrow">Sala de juego</p>
            <h2 id="roomTitle"></h2>
            <p id="roomMeta"></p>
          </div>
          <div class="hero-actions">
            <button id="copyCodeBtn" class="btn btn-ghost" type="button">Copiar código</button>
            <button id="shareSummaryBtn" class="btn btn-ghost" type="button">Copiar resumen</button>
            <button id="leaveRoomBtn" class="btn btn-danger" type="button">Salir de sala</button>
            <button id="backLobbyBtn" class="btn btn-ghost" type="button">Volver</button>
          </div>
        </div>
        <div id="roomTopStats" class="top-metrics"></div>
      </section>

      <nav class="quick-tabs card glass" aria-label="Navegación interna de la sala">
        <a href="#playersSection" class="chip">Jugadores</a>
        <a href="#pairsSection" class="chip">Parejas</a>
        <a href="#scheduleSection" class="chip">Jornadas</a>
        <a href="#standingsSection" class="chip">Clasificación</a>
        <a href="#socialSection" class="chip">Historial y chat</a>
      </nav>

      <section id="playersSection" class="card glass stack-md">
        <div class="section-title-row wrap-mobile"><h3>Jugadores</h3><span id="capacityBadge" class="capacity-badge"></span></div>
        <div id="playersGrid" class="players-grid"></div>
      </section>

      <section id="attendanceCard" class="card glass stack-md"></section>
      <section id="waitlistCard" class="card glass stack-md"></section>
      <section id="adminPanel" class="stack-lg"></section>

      <div class="grid-two room-grid-bottom">
        <section id="pairsSection" class="card glass stack-md">
          <div class="section-title-row wrap-mobile"><h3>Parejas</h3><span class="subtle">Sorteo inicial</span></div>
          <div id="pairsList" class="stack-sm"></div>
        </section>

        <section id="standingsSection" class="card glass stack-md">
          <div class="section-title-row wrap-mobile"><h3>Clasificación</h3><span class="subtle">Por parejas</span></div>
          <div id="standingsPodium"></div>
          <div id="standingsTable"></div>
        </section>
      </div>

      <section id="scheduleSection" class="card glass stack-md">
        <div class="section-title-row wrap-mobile"><h3>Jornadas y resultados</h3><span class="subtle">Un solo set libre</span></div>
        <div id="nextPendingWrap"></div>
        <div id="matchesBoard"></div>
      </section>

      <section id="socialSection" class="grid-two room-grid-bottom">
        <section class="card glass stack-md">
          <div class="section-title-row wrap-mobile"><h3>Historial</h3><span class="subtle">Últimos cambios</span></div>
          <div id="historyFeed" class="stack-sm"></div>
        </section>

        <section class="card glass stack-md">
          <div class="section-title-row wrap-mobile"><h3>Chat</h3><span class="subtle">Mensajes de sala</span></div>
          <div id="chatMessages" class="stack-sm"></div>
          <form id="chatForm" class="chat-form">
            <input name="message" maxlength="180" placeholder="Escribe un mensaje rápido">
            <button class="btn btn-primary" type="submit">Enviar</button>
          </form>
        </section>
      </section>

      <section class="card glass stack-md">
        <div class="section-title-row wrap-mobile"><h3>Avisos</h3><span class="subtle">Centro de avisos</span></div>
        <div id="notificationsFeed" class="stack-sm"></div>
      </section>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
